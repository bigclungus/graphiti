services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "127.0.0.1:6379:6379" # Redis/FalkorDB port
      - "127.0.0.1:3000:3000" # FalkorDB web UI
    environment:
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      - BROWSER=${BROWSER:-1}  # Enable FalkorDB Browser UI (set to 0 to disable)
    volumes:
      - falkordb_data:/data
    command: redis-server --stop-writes-on-bgsave-error no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  graphiti-mcp:
    # To use the latest graphiti-core, build locally with:
    #   docker compose -f docker-compose-falkordb.yml build
    # The Docker Hub image may lag behind the latest release.
    image: zepai/knowledge-graph-mcp:standalone
    build:
      context: ..
      dockerfile: docker/Dockerfile.standalone
    env_file:
      - path: ../.env
        required: false
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      # Database configuration
      - FALKORDB_URI=${FALKORDB_URI:-redis://falkordb:6379}
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      - FALKORDB_DATABASE=${FALKORDB_DATABASE:-discord_history}
      # Application configuration
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-discord_history}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}
      - CONFIG_PATH=/app/mcp/config/config.yaml
      - PATH=/root/.local/bin:${PATH}
    volumes:
      - /mnt/data/graphiti/repo/mcp_server/config/config.yaml:/app/mcp/config/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000" # Expose the MCP server via HTTP transport
    command: ["uv", "run", "main.py"]

volumes:
  falkordb_data:
    driver: local